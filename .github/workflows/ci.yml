name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile source
        run: python -m compileall -q src tests

      - name: Run deterministic tests
        run: |
          set +e
          python -m unittest discover -s tests -v > test-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 test-output.log
          fi
          exit "$status"

      - name: Upload test failure log
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: test-failure-python-${{ matrix.python-version }}
          path: test-output.log
          if-no-files-found: error

  quality:
    name: Quality and package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: |
          set +e
          ruff check src tests benchmarks scripts examples --output-format=concise \
            > quality-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            cat quality-output.log
          fi
          exit "$status"

      - name: Upload quality failure log
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: quality-failure
          path: quality-output.log
          if-no-files-found: error

      - name: Static security scan
        run: |
          set +e
          bandit -q -r src/getbible -x src/getbible/data > security-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            cat security-output.log
          fi
          exit "$status"

      - name: Upload security failure log
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: security-failure
          path: |
            security-output.log
            src/getbible/getbible.py
            src/getbible/search.py
            src/getbible/translation_cache.py
          if-no-files-found: error

      - name: Dependency vulnerability scan
        run: python -m pip_audit

      - name: Build distributions
        run: python -m build

      - name: Verify distributions
        run: python -m twine check dist/*

      - name: Test built wheel in isolation
        run: |
          python -m venv "${RUNNER_TEMP}/getbible-wheel"
          "${RUNNER_TEMP}/getbible-wheel/bin/python" -m pip install dist/*.whl
          cd "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/getbible-wheel/bin/python" -c "from getbible import GetBible, RequestLimits, SearchBible, SearchLimits, SourceGeneration; assert SearchBible().limit == 100; assert RequestLimits().max_references == 8; assert SearchLimits().max_work_units == 50000000; assert SourceGeneration('test', 0, 'initial', 0).cache_namespace == 'test:g0'; GetBible().close()"

      - name: Upload distributions
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: getbible-distributions
          path: dist/*
          if-no-files-found: error
