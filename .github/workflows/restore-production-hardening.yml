name: Inspect production hardening archive

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/production-release-hardening
          fetch-depth: 0

      - name: Record archive format
        run: |
          set -euo pipefail
          {
            file _recovery/patch.tar.gz
            stat --printf='size=%s\n' _recovery/patch.tar.gz
            xxd -l 64 -p _recovery/patch.tar.gz
            printf 'tar_gzip='; if tar -tzf _recovery/patch.tar.gz >/dev/null 2>&1; then echo yes; else echo no; fi
            printf 'zip='; if unzip -tq _recovery/patch.tar.gz >/dev/null 2>&1; then echo yes; else echo no; fi
            printf 'tar='; if tar -tf _recovery/patch.tar.gz >/dev/null 2>&1; then echo yes; else echo no; fi
            printf 'base64='; if base64 --decode _recovery/patch.tar.gz >/tmp/decoded 2>/dev/null; then echo yes; file /tmp/decoded; stat --printf='decoded_size=%s\n' /tmp/decoded; xxd -l 64 -p /tmp/decoded; else echo no; fi
          } > _recovery/diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _recovery/diagnostic.txt
          git commit -m "Record hardening archive format"
          git push origin HEAD:agent/production-release-hardening
