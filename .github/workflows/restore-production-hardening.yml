name: Restore production hardening patch

on:
  push:
    branches:
      - agent/production-release-hardening
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: restore-production-hardening
  cancel-in-progress: false

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/production-release-hardening
          fetch-depth: 0

      - name: Recover audited patch
        run: |
          set -euo pipefail
          encoded="${RUNNER_TEMP}/production-hardening.b64"
          archive="${RUNNER_TEMP}/production-hardening.tar.gz"
          : > "${encoded}"
          shas=(
            510fd886f960930c28ff0bdac1ff885e2e67e058
            facbeda2a6bef61d99e9665293201ba8167cd786
            33463f438a1cfd9f3bb84488e3264fc45b16b070
            d0b99c42e127c848d1a9eab987b22b3bbf093e8d
            c63bb07ca289e9f6cab60e22679691ebd1f49bb1
            ef49f4b9b8b93ce65df881bc8c7d3596272ccfc6
            b66d206e05dd87dcf48696526d953a163fc3bc2d
            9a4538716912bb29f01e787897f910d7d91d92f5
            03e30ec0a8967f50fd59bc3986bda436f6f43cb7
            9f7c9c8dd40dd767aac856ad018ebcf4bf1e79cf
            4dfc06b855381ba659d8fe598f071963679489c0
            5ca757262dbd14b969c0adcda5951a2311462393
            94d23ab999dde38ae1a5dcca778c0e6cd7164a11
          )
          for sha in "${shas[@]}"; do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq .content \
              | tr -d '\n' | base64 --decode >> "${encoded}"
          done
          base64 --decode "${encoded}" > "${archive}"
          tar -tzf "${archive}" >/dev/null

          git rm -r --ignore-unmatch .
          git checkout 1020df0f67344902af69d2dc6a9a128aa52e646f -- .
          tar -xzf "${archive}" -C .
          rm -rf _recovery
          rm -f .github/workflows/restore-production-hardening.yml

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Validate recovered patch
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m compileall -q src tests
          python -m unittest discover -s tests -v

      - name: Commit complete patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore production release hardening"
          git push origin HEAD:agent/production-release-hardening
