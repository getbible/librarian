name: Live API Integration

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GETBIBLE_RUN_LIVE_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run live API tests
        env:
          GETBIBLE_CACHE_DIR: ${{ runner.temp }}/getbible-cache
        run: python -m unittest tests.test_getbible tests.test_live_search -v
