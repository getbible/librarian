name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version from pyproject.toml, without the leading v"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Python ${{ matrix.python-version }} release gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout frozen source commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Verify frozen master/tag commit
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            test "${REF_NAME}" = "master"
          fi

      - name: Run CI test suite
        run: |
          python -m compileall -q src tests
          python -m unittest discover -s tests -v

  build:
    name: Build immutable distributions
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      release-tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - name: Checkout frozen source commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Resolve and verify release tag
        id: release-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSHED_TAG: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="v${REQUESTED_VERSION}"
          else
            RELEASE_TAG="${PUSHED_TAG}"
          fi
          python scripts/check_release_version.py "${RELEASE_TAG}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build once
        run: |
          rm -rf build dist *.egg-info
          python -m build
          python -m twine check dist/*
          sha256sum dist/* | tee dist/SHA256SUMS

      - name: Attest distributions
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "dist/*"

      - name: Upload immutable distributions
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: getbible-release-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish trusted release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout frozen source commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download immutable distributions
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: getbible-release-${{ github.sha }}
          path: dist

      - name: Create and push release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.build.outputs.release-tag }}
        run: |
          git fetch --tags origin
          CURRENT_COMMIT="$(git rev-parse HEAD)"
          test "${CURRENT_COMMIT}" = "${GITHUB_SHA}"
          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            TAG_COMMIT="$(git rev-list -n 1 "${RELEASE_TAG}")"
            test "${TAG_COMMIT}" = "${CURRENT_COMMIT}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@67339c736fd9354cd4f8cb0b744f2b82a74b5c70 # release/v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release-tag }}
        run: gh release create "${RELEASE_TAG}" dist/* --generate-notes --verify-tag
