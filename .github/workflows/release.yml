name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version from pyproject.toml, without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && 'master' || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Resolve and verify release tag
        id: release-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSHED_TAG: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="v${REQUESTED_VERSION}"
          else
            RELEASE_TAG="${PUSHED_TAG}"
          fi
          python scripts/check_release_version.py "${RELEASE_TAG}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build distributions
        run: python -m build

      - name: Verify distributions
        run: python -m twine check dist/*

      - name: Create and push release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          git fetch --tags origin
          CURRENT_COMMIT="$(git rev-parse HEAD)"
          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            TAG_COMMIT="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [ "${TAG_COMMIT}" != "${CURRENT_COMMIT}" ]; then
              echo "Tag ${RELEASE_TAG} already points to ${TAG_COMMIT}, not ${CURRENT_COMMIT}." >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: gh release create "${RELEASE_TAG}" dist/* --generate-notes --verify-tag
